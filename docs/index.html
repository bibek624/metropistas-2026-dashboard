<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Metropistas 2026 — Data Collection Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Metropistas 2026</h1>
  <div class="ctrl-group primary" id="mode-toggle">
    <button data-mode="RFT" class="active">RFT · Friction</button>
    <button data-mode="MFV">MFV · IRI</button>
  </div>
  <div class="ctrl-group" id="network-toggle">
    <button data-net="AMPR" class="active">AMPR</button>
    <button data-net="PRTR">PRTR</button>
  </div>
  <div class="ctrl-group" id="level-toggle">
    <button data-level="segments" class="active">0.05-mi segments</button>
    <button data-level="sections" title="Original .sec sections">Sections</button>
  </div>
  <span id="updated"></span>
</header>

<div id="layout">
  <aside id="sidebar">
    <div class="card" id="progress-card">
      <h2 id="gauge-title">Progress</h2>
      <div id="gauges">
        <div class="gauge-box"><svg id="gauge-collected" viewBox="0 0 200 115"></svg><div class="gauge-label">Collected</div></div>
        <div class="gauge-box"><svg id="gauge-sectioned" viewBox="0 0 200 115"></svg><div class="gauge-label">Sectioned</div></div>
      </div>
      <table id="miles-table"></table>
    </div>

    <details class="card" id="roads-card" open>
      <summary>Roads <span class="hint">tap to zoom</span></summary>
      <div id="road-bars"></div>
    </details>
  </aside>

  <div id="map">
    <div id="info-panel">
      <button id="info-close" title="Close">✕</button>
      <div id="info-content"></div>
    </div>
  </div>

  <aside id="rightbar">
    <div class="card">
      <h2>View</h2>
      <div id="layer-list"></div>
      <div id="legend"></div>
    </div>
    <div class="card">
      <h2>Basemap</h2>
      <div id="basemap-list"></div>
    </div>
    <div class="card" id="lines-card">
      <h2>Test lines</h2>
      <label class="tl-switch"><input type="checkbox" id="tl-toggle" checked> Show test lines <span class="hint" id="lines-hint"></span></label>
      <div id="testline-panel"></div>
    </div>
  </aside>
</div>

<div id="loading">Loading data…</div>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="app.js"></script>
</body>
</html>
